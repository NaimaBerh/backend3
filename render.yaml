# Blueprint Render — déploiement automatique
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: fake-profile-detector-api
    env: python
    region: frankfurt
    plan: free

    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      - key: ALLOWED_ORIGINS
        value: "http://fakeprofiledetector.wuaze.com/"

      - key: LSTM_THRESHOLD
        value: "0.7"